<!doctype html>
<html lang="en" xmlns:th ="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <style>
      p{
        color: red;
      }
    </style>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<form th:action="@{/add/devices}" th:object="${device}" method="post">
  <div class="form-group">
    <label>deviceName</label>
    <input type="text"
           class="form-control" th:field="*{deviceName}" >
    <p th:errors="*{deviceName}"></p>
  </div>
  <div class="form-group">
    <label>Model Code</label>
    <input type="text"
           class="form-control" th:field="*{modelCode}" >
    <p th:errors="*{modelCode}"></p>
  </div>
  <div class="form-group">
    <label>Price</label>
    <input type="number"
           class="form-control" th:field="*{price}" >
  </div>
  <div class="form-group">
    <label>Date</label>
    <input type="date"
           class="form-control" th:field="*{manufactureDate}" >
    <p th:errors="*{manufactureDate}"></p>
  </div>
  <div class="form-group">
    <label>Img</label>
    <input type="file"
           class="form-control" th:field="*{productImage}" >
  </div>
  <select >
    <option th:each="b : ${brands}" th:value="${b}" th:text="${b.name}"></option>
  </select>
  <br>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
