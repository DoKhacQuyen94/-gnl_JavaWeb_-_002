<!doctype html>
<html lang="en" xmlns:th ="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<a name="" id="" class="btn btn-primary" th:href="@{/add/brand}" role="button">Thêm mới Brand</a>
<a name="" id="" class="btn btn-primary" th:href="@{/add/device}" role="button">Thêm mới Device</a>
<table class="table table-striped w-full">
    <thead class="thead-inverse">
    <tr>
        <th>ID</th>
        <th>DeviceName</th>
        <th>Model</th>
        <th>Price</th>
        <th>Date</th>
        <th>Img</th>
        <th>Brand</th>
        <th>Available</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="d : ${devices}">
        <td scope="row" th:text="${d.id}"></td>
        <td th:text="${d.deviceName}"></td>
        <td th:text="${d.modelCode}"></td>
        <td th:text="${d.price}"></td>
        <td th:text="${d.manufactureDate}"></td>
        <td >
            <img th:src="${d.productImage}" width="70" height="70">
        </td >
        <td th:text="${d.brand.name}"></td>
        <td th:text="${d.isAvailable ? 'Còn sẵn' : 'hết hàng'}"></td>
    </tr>
    </tbody>
</table>
<nav aria-label="Page navigation">
    <ul class="pagination">
        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link" th:href="@{/?page=${currentPage - 1}}" aria-label="Previous">
                <span aria-hidden="true">&laquo;</span>
                <span class="sr-only">Previous</span>
            </a>
        </li>
<!--        <li class="page-item active"><a class="page-link" href="#"></a></li>-->
        <li class="page-item" th:classappend="${currentPage == p -1 ? 'active':''}" th:each="p : ${#numbers.sequence(1,totalPage)}">
            <a class="page-link" th:href="@{|/?page=${p - 1}|}" th:text="${p}"></a>
        </li>
        <li class="page-item" th:classappend="${currentPage == totalPage -1} ? 'disabled'">
            <a class="page-link" th:href="@{/?page=${currentPage + 1}}" aria-label="Next">
                <span aria-hidden="true">&raquo;</span>
                <span class="sr-only">Next</span>
            </a>
        </li>
    </ul>
</nav>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
